name: Auto Bump Frontend Version

on:
  push:
    branches:
      - master

jobs:
  bump-version:
    # Only run when the PR was actually merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a token with write access so the commit can trigger downstream workflows
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Check if package.json version was modified in this PR
        id: version_check
        run: |
          # Compare the base and head of the merged PR for changes to frontend/package.json
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.merge_commit_sha }}"

          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -q "^frontend/package.json$"; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            echo "frontend/package.json was already modified in this PR — skipping auto-bump."
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
            echo "frontend/package.json was NOT modified — will auto-bump patch version."
          fi

      - name: Set up Node.js
        if: steps.version_check.outputs.version_changed == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump patch version
        if: steps.version_check.outputs.version_changed == 'false'
        working-directory: frontend
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Bump patch version in package.json without creating a git tag
          npm version patch --no-git-tag-version

          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "Bumped to $NEW_VERSION"

          git add package.json
          git commit -m "chore: auto-bump frontend version to $NEW_VERSION [skip ci]"
          git push origin master
