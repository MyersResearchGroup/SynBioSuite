name: Azure Static Web Apps CI/CD

env:
  VITE_IBIOSIM_API: https://ibiosimconnector-api.azurewebsites.net/api/orchestrators/analyze
  VITE_SBOL_CANVAS_URL: https://sbolcanvas.org
  VITE_SYNBIOSUITE_API: https://synbiosuite-api.victoriouswater-326a4bf8.westcentralus.azurecontainerapps.io
  VITE_SEQIMPROVE_URL: https://seqimprove.synbiohub.org

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
      - converted_to_draft
      - ready_for_review
    branches:
      - master

concurrency:
  group: >
    azure-static-web-apps-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}-${{ (github.event_name == 'pull_request' && (github.event.action == 'closed' || github.event.action == 'converted_to_draft')) && 'cleanup' || 'active' }}
  cancel-in-progress: ${{ !(github.event_name == 'pull_request' && (github.event.action == 'closed' || github.event.action == 'converted_to_draft')) }}

jobs:
  validate_pull_request_job:
    if: >
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    name: Validate Pull Request
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Run tests
        working-directory: frontend
        run: npm test
      - name: Build app
        working-directory: frontend
        run: npm run build

  build_and_deploy_job:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WITTY_HILL_08172A210 }}
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/frontend" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "dist" # Built app content directory - optional
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: >
      github.event_name == 'pull_request' &&
      (github.event.action == 'closed' || github.event.action == 'converted_to_draft')
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WITTY_HILL_08172A210 }}
          action: "close"
          app_location: "/"
